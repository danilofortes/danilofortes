name: Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Main metrics card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: danilofortes
          filename: metrics/metrics.svg
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: America/Sao_Paulo

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: danilofortes
          filename: metrics/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_indepth: yes
          plugin_languages_ignored: html, css, scss, less
          plugin_languages_limit: 8

      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: danilofortes
          filename: metrics/calendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: danilofortes
          filename: metrics/achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

      - name: Followup
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: danilofortes
          filename: metrics/followup.svg
          base: ""
          plugin_followup: yes
          plugin_followup_sections: repositories, user
